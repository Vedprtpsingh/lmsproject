version: '3.8'

services:
  mysql:
    image: mysql:8.4
    container_name: lmspro-mysql
    environment:
      # Replace these credentials with your own values if needed.
      MYSQL_DATABASE: veddb
      MYSQL_USER: ved
      MYSQL_PASSWORD: ved123
      MYSQL_ROOT_PASSWORD: ved123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: lmspro-backend
    environment:
      # Spring Boot datasource settings for MySQL
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/veddb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ved
      SPRING_DATASOURCE_PASSWORD: ved123
      SPRING_DATASOURCE_DRIVER: com.mysql.cj.jdbc.Driver

      # Hibernate / JPA settings
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: false

      # CORS origins for frontend access
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173,http://localhost

      # H2 console is disabled because MySQL is the production database here
      H2_CONSOLE_ENABLED: false
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: lmspro-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  mysql-data:
